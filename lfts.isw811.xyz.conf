<VirtualHost *:80>
	ServerName lfts.isw811.xyz
	ServerAlias www.lfts.isw811.xyz

	ServerAdmin webmaster@localhost
	DocumentRoot /vagrant/sites/lfts.isw811.xyz/public
	DirectoryIndex index.php index.html

	<Directory /vagrant/sites/lfts.isw811.xyz/public>
		Options FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/lfts_error.log
	CustomLog ${APACHE_LOG_DIR}/lfts_access.log combined
</VirtualHost>
